<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="桌子计时">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>桌子计时</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="date-label" id="todayLabel"></p>
        <h1>桌子计时</h1>
      </div>
      <button class="icon-button" id="addTableBtn" type="button" aria-label="添加桌子">+</button>
    </header>

    <section class="summary" aria-label="今日概览">
      <div>
        <span class="summary-label">使用中</span>
        <strong id="activeCount">0</strong>
      </div>
      <div>
        <span class="summary-label">今日完成</span>
        <strong id="recordCount">0</strong>
      </div>
    </section>

    <section class="tables" id="tablesList" aria-label="桌子列表"></section>

    <section class="records">
      <div class="section-title">
        <h2>当天记录</h2>
        <button class="text-button" id="clearRecordsBtn" type="button">清空</button>
      </div>
      <div class="record-list" id="recordList"></div>
    </section>
  </main>

  <template id="tableTemplate">
    <article class="table-card">
      <div class="table-head">
        <div>
          <span class="status-dot"></span>
          <span class="status-text"></span>
        </div>
        <button class="small-danger" type="button" data-action="remove">删除</button>
      </div>
      <div class="table-number"></div>
      <div class="timer"></div>
      <div class="meta"></div>
      <div class="controls">
        <button type="button" class="primary" data-action="start">开始计时</button>
        <button type="button" data-action="extend">延长时间</button>
        <button type="button" data-action="finish">计时结束</button>
      </div>
    </article>
  </template>

  <dialog id="extendDialog">
    <form method="dialog" class="dialog-card">
      <h2>延长时间</h2>
      <p id="extendTarget"></p>
      <div class="quick-times">
        <button value="10" type="submit">+10 分钟</button>
        <button value="30" type="submit">+30 分钟</button>
        <button value="60" type="submit">+1 小时</button>
      </div>
      <label>
        自定义分钟
        <input id="customMinutes" type="number" inputmode="numeric" min="1" max="600" placeholder="例如 45">
      </label>
      <div class="dialog-actions">
        <button value="cancel" type="submit">取消</button>
        <button value="custom" class="primary" type="submit">确认</button>
      </div>
    </form>
  </dialog>

  <dialog id="tablePickerDialog">
    <form method="dialog" class="dialog-card">
      <h2>选择桌号</h2>
      <div class="table-picker" id="tablePicker"></div>
      <div class="dialog-actions">
        <button value="cancel" type="submit">取消</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }
  </script>
</body>
</html>
